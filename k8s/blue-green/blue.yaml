apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-blue
  labels: { app: demo, version: blue }
spec:
  replicas: 3
  selector:
    matchLabels: { app: demo, version: blue }
  template:
    metadata:
      labels: { app: demo, version: blue }
    spec:
      containers:
        - name: web
          image: IMAGE_V1
          ports: [{ containerPort: 80 }]
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 2
            periodSeconds: 3
