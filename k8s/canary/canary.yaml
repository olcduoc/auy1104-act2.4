apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-canary
  labels: { app: demo-canary, track: canary }
spec:
  replicas: 1
  selector:
    matchLabels: { app: demo-canary, track: canary }
  template:
    metadata:
      labels: { app: demo-canary, track: canary }
    spec:
      containers:
        - name: web
          image: IMAGE_V2
          ports: [{ containerPort: 80 }]
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 2
            periodSeconds: 3
