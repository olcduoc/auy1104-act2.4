apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-stable
  labels: { app: demo-canary, track: stable }
spec:
  replicas: 9
  selector:
    matchLabels: { app: demo-canary, track: stable }
  template:
    metadata:
      labels: { app: demo-canary, track: stable }
    spec:
      containers:
        - name: web
          image: IMAGE_V1
          ports: [{ containerPort: 80 }]
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 2
            periodSeconds: 3
