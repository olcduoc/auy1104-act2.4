apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-recreate
  labels:
    app: demo
    strategy: recreate
spec:
  replicas: 4
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: demo
      strategy: recreate
  template:
    metadata:
      labels:
        app: demo
        strategy: recreate
    spec:
      containers:
        - name: web
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 2
            periodSeconds: 3
