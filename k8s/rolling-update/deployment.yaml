apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-rolling
  labels:
    app: demo
    strategy: rolling-update
spec:
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: demo
      strategy: rolling-update
  template:
    metadata:
      labels:
        app: demo
        strategy: rolling-update
    spec:
      containers:
        - name: web
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 2
            periodSeconds: 3
